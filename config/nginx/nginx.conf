# Nginx 模块加载配置
# Brotli 压缩模块（必须在 http 块之前加载）
load_module modules/ngx_http_brotli_filter_module.so;  # Brotli 动态压缩模块
load_module modules/ngx_http_brotli_static_module.so;   # Brotli 静态压缩模块

# Nginx 全局配置
user  www www;                    # 运行用户与用户组（www 用户需具备网站目录权限）
worker_processes auto;            # 工作进程数（自动检测 CPU 核心数，推荐值为 CPU 核心数）
worker_rlimit_nofile 51200;     # 工作进程最大文件打开数（需大于 worker_connections）

# 日志配置
error_log /www/wwwlogs/nginx_error.log crit;  # 错误日志路径与级别（仅记录严重错误）

# 进程配置
pid /www/server/nginx/logs/nginx.pid;  # Nginx 主进程 PID 文件路径

# Stream 模块配置（用于 TCP/UDP 代理）
stream {
    # TCP 日志格式配置
    log_format tcp_format '$time_local|$remote_addr|$protocol|$status|$bytes_sent|$bytes_received|$session_time|$upstream_addr|$upstream_bytes_sent|$upstream_bytes_received|$upstream_connect_time';
    
    # TCP 日志配置
    access_log /www/wwwlogs/tcp-access.log tcp_format;  # TCP 访问日志
    error_log /www/wwwlogs/tcp-error.log;  # TCP 错误日志
    
    # 包含 TCP 虚拟主机配置
    include /www/server/panel/vhost/nginx/tcp/*.conf;
}

# 事件模块配置
# 处理网络连接事件的核心配置

events {
    use epoll;                  # 使用 epoll 事件驱动模型（适用于 Linux 系统，高性能）
    worker_connections 51200;  # 每个工作进程的最大并发连接数
    multi_accept on;            # 允许工作进程同时接受多个网络连接（提升连接建立效率）
}

# HTTP 模块配置
# 处理 HTTP 请求的核心配置，包括压缩、缓存、性能优化等

http {
    # 基础配置
    include mime.types;              # 包含标准 MIME 类型定义
    default_type application/octet-stream;  # 默认 MIME 类型（用于未知文件类型）
    
    # 安全模块配置（已注释，可根据需要启用）
    #include luawaf.conf;            # 包含 Lua 防火墙配置
    
    # 代理与 Lua 配置
    include proxy.conf;              # 包含代理服务器配置
    lua_package_path "/www/server/nginx/lib/lua/?.lua;;";  # Lua 模块加载路径
    
    # 服务器名称与请求头配置
    server_names_hash_bucket_size 512;  # 服务器名称哈希表大小
    client_header_buffer_size 32k;       # 客户端请求头缓冲区大小
    large_client_header_buffers 4 32k;   # 大客户端请求头缓冲区配置（4个32k缓冲区）

    # TCP 性能优化配置
    sendfile on;                        # 启用零拷贝文件传输（提升文件传输效率）
    tcp_nopush on;                      # 启用 TCP NOPUSH（与 sendfile 配合使用，提升大文件传输性能）
    tcp_nodelay on;                     # 启用 TCP NODELAY（减少网络延迟，提升小文件传输性能）
    
    # 长连接配置
    keepalive_timeout 60;               # 客户端与服务器保持长连接的超时时间（60秒）
    keepalive_requests 100;             # 单个长连接允许的最大请求数（100个请求后关闭连接）
    
    # 客户端请求配置
    client_max_body_size 100m;          # 客户端最大请求体大小（100MB，适用于上传大文件）

    # FastCGI 配置（用于 PHP 解析）
    fastcgi_connect_timeout 300;        # FastCGI 连接超时时间（300秒）
    fastcgi_send_timeout 300;           # FastCGI 发送超时时间（300秒）
    fastcgi_read_timeout 300;           # FastCGI 读取超时时间（300秒）
    fastcgi_buffer_size 64k;            # FastCGI 缓冲区大小
    fastcgi_buffers 4 64k;              # FastCGI 缓冲区配置（4个64k缓冲区）
    fastcgi_busy_buffers_size 128k;    # FastCGI 繁忙缓冲区大小
    fastcgi_temp_file_write_size 256k;  # FastCGI 临时文件写入大小
    fastcgi_intercept_errors on;         # 允许 Nginx 拦截并处理 FastCGI 错误

    # Gzip 压缩配置（作为 Brotli 的降级方案，兼容旧版浏览器）
    gzip on;                              # 启用 Gzip 压缩
    gzip_vary on;                        # 允许根据客户端能力提供不同压缩版本（通过 Vary 头）
    gzip_min_length 512;                # 最小压缩文件大小（小于此值的文件不压缩）
    gzip_comp_level 5;                   # 压缩级别（1-9，5为压缩率与速度的平衡值）
    gzip_proxied expired no-cache no-store private auth;  # 压缩指定条件的代理请求响应
    gzip_disable "MSIE [1-6]\.";     # 禁用 IE6 及更早版本的 Gzip 压缩
    # Gzip 压缩的文件类型
    gzip_types 
        text/plain 
        text/css 
        application/javascript 
        text/xml 
        application/xml 
        application/xhtml+xml 
        application/rss+xml 
        application/json 
        application/x-javascript 
        application/wasm 
        application/octet-stream 
        image/svg+xml 
        font/ttf 
        font/otf 
        image/x-icon;

    # Brotli 压缩配置（现代浏览器优先支持，比 Gzip 压缩率更高）
    brotli on;                           # 启用 Brotli 压缩
    brotli_min_length 512;              # 最小压缩文件大小（与 Gzip 保持一致）
    brotli_comp_level 6;                # 压缩级别（1-11，6为压缩率与速度的平衡值）
    # Brotli 压缩的文件类型（与 Gzip 保持一致）
    brotli_types 
        text/plain 
        text/css 
        application/javascript 
        text/xml 
        application/xml 
        application/xhtml+xml 
        application/rss+xml 
        application/json 
        application/x-javascript 
        application/wasm 
        application/octet-stream 
        image/svg+xml 
        font/ttf 
        font/otf 
        image/x-icon;
    
    # 连接限制配置
    limit_conn_zone $binary_remote_addr zone=perip:10m;  # 基于客户端IP的连接限制区域
    limit_conn_zone $server_name zone=perserver:10m;      # 基于服务器名称的连接限制区域
    
    # 安全与性能优化
    server_tokens off;                   # 隐藏 Nginx 版本信息（提升安全性）
    access_log off;                      # 关闭全局访问日志（提升性能，可在虚拟主机中单独配置）

    # 内置 PHPMyAdmin 服务器配置
    server {
        listen 888;                      # 监听端口（宝塔面板默认的 PHPMyAdmin 端口）
        server_name phpmyadmin;          # 服务器名称
        index index.html index.htm index.php;  # 默认文档顺序
        root /www/server/phpmyadmin;
            location ~ /tmp/ {
                return 403;
            }
        allow 127.0.0.1;
        allow ::1;
        deny all;     # PHPMyAdmin 根目录
        
        # 错误页面配置（已注释，可根据需要启用）
        #error_page 404 /404.html;      # 404 错误页面
        
        # PHP 解析配置
        include enable-php.conf;         # 包含 PHP 解析配置
        
        # 静态资源缓存配置
        location ~ .*\.(gif|jpg|jpeg|png|bmp|swf)$ {
            expires 30d;                  # 图片资源缓存 30 天
        }
        location ~ .*\.(js|css)?$ {
            expires 12h;                  # JavaScript 和 CSS 资源缓存 12 小时
        }
        
        # 安全配置
        location ~ /\. {
            deny all;                     # 禁止访问隐藏文件和目录（如 .git, .env 等）
        }
        
        # 访问日志配置
        access_log /www/wwwlogs/access.log;  # PHPMyAdmin 访问日志
    }

    # 包含虚拟主机配置文件
    include /www/server/panel/vhost/nginx/*.conf;  # 包含所有用户自定义的虚拟主机配置
}

