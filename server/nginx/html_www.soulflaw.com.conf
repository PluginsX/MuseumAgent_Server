server 
{ 
    listen 80; 
    listen 443 ssl; 
    listen 443 quic; 
    http2 on; 
    server_name www.soulflaw.com; 
    index index.html index.htm default.htm default.html; 
    root /www/wwwroot/MuseumAgent_Client; 
    include /www/server/panel/vhost/nginx/extension/www.soulflaw.com/*.conf; 
    #CERT-APPLY-CHECK--START 
    # 用于SSL证书申请时的文件验证相关配置 -- 请勿删除并保持这段设置在优先级高的位置 
    include /www/server/panel/vhost/nginx/well-known/www.soulflaw.com.conf; 
    #CERT-APPLY-CHECK--END 

    #SSL-START SSL相关配置，请勿删除或修改下一行带注释的404规则 
    #error_page 404/404.html; 
    #HTTP_TO_HTTPS_START 
    set $isRedcert 1; 
    if ($server_port != 443) { 
        set $isRedcert 2; 
    } 
    if ( $uri ~ /\.well-known/ ) { 
        set $isRedcert 1; 
    } 
    if ($isRedcert != 1) { 
        rewrite ^(/.*)$ https://$host$1 permanent; 
    } 
    #HTTP_TO_HTTPS_END 
    ssl_certificate    /www/server/panel/vhost/cert/www.soulflaw.com/fullchain.pem; 
    ssl_certificate_key    /www/server/panel/vhost/cert/www.soulflaw.com/privkey.pem; 
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3; 
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5; 
    ssl_prefer_server_ciphers on; 
    ssl_session_tickets on; 
    ssl_session_cache shared:SSL:10m; 
    ssl_session_timeout 10m; 
    add_header Strict-Transport-Security "max-age=31536000"; 
    add_header Alt-Svc 'quic=":443"; h3=":443"; h3-29=":443"; h3-27=":443";h3-25=":443"; h3-T050=":443"; h3-Q050=":443";h3-Q049=":443";h3-Q048=":443"; h3-Q046=":443"; h3-Q043=":443"'; 
    error_page 497 https://$host$request_uri; 

    #SSL-END 

    # ========== Unity WebGL Build 文件服务（优化版 - Gzip 压缩）==========
    
    # ✅ 优化1：.unityweb 文件（已压缩）- 直接提供，添加正确的 Content-Encoding 头
    location ~ ^/unity/Build/(.+\.unityweb)$ {
        alias /www/wwwroot/MuseumAgent_Client/unity/Build/$1;
        
        # ✅ 关键：告诉浏览器文件已经 Gzip 压缩
        add_header Content-Encoding gzip;
        
        # CORS 支持
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Content-Encoding, Range";
        
        # ✅ 优化：强缓存（1年）- Unity 文件名包含哈希，可以安全缓存
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 365d;
        
        # ✅ 优化：增加超时时间，支持慢速网络
        send_timeout 600s;
        client_body_timeout 600s;
        
        # ✅ 优化：支持断点续传
        add_header Accept-Ranges bytes;
        
        # MIME 类型
        types {
            application/octet-stream unityweb;
        }
        
        # 禁用动态压缩（文件已预压缩）
        gzip off;
        brotli off;
        
        # 禁用访问日志（减少 I/O）
        access_log off;
    }
    
    # ✅ 优化2：.loader.js 文件（未压缩）- 允许动态压缩
    location ~ ^/unity/Build/(.+\.loader\.js)$ {
        alias /www/wwwroot/MuseumAgent_Client/unity/Build/$1;
        
        # CORS 支持
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        
        # 缓存策略
        add_header Cache-Control "public, max-age=31536000";
        expires 365d;
        
        # MIME 类型
        types { 
            application/javascript js; 
        }
        
        # 允许动态压缩（loader.js 未预压缩）
        gzip on;
        gzip_types application/javascript;
        
        access_log off;
    }
    
    # ✅ 优化3：处理 OPTIONS 预检请求（必须在其他规则之前）
    location /unity/Build/ {
        alias /www/wwwroot/MuseumAgent_Client/unity/Build/;
        
        # 处理 CORS 预检请求
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Content-Encoding, Range";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
        
        # CORS 支持
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        
        # 增加超时时间
        send_timeout 600s;
        client_body_timeout 600s;
        client_max_body_size 500M;
        
        # 禁用动态压缩（.unityweb 文件已预压缩）
        gzip off;
        brotli off;
        
        access_log off;
    }
    
    # ========== Unity Addressables 资源服务（优化版）==========
    location /unity/ServerData/ {
        alias /www/wwwroot/MuseumAgent_Client/unity/ServerData/;
        
        # CORS 支持
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Content-Encoding, Range";
        
        # 处理 CORS 预检请求
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Content-Encoding, Range";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
        
        # ✅ 优化：增加超时时间（支持大型 AssetBundle 文件和慢速网络）
        send_timeout 600s;
        client_body_timeout 600s;
        client_max_body_size 500M;
        
        # ✅ 优化：支持断点续传
        add_header Accept-Ranges bytes;
        
        # Unity AssetBundle 文件类型
        types {
            application/octet-stream bundle;
            application/json json;
            text/plain hash;
        }
        
        # ✅ 优化：长期缓存（AssetBundle 文件名包含哈希值）
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 365d;
        
        # 禁用访问日志（减少 I/O）
        access_log off;
        
        # 允许动态压缩（AssetBundle 通常未预压缩）
        gzip on;
        gzip_types application/octet-stream application/json;
        gzip_comp_level 5;
    }
    
    # ✅ 优化：Unity StreamingAssets 资源服务（支持音频、视频等）
    location /unity/StreamingAssets/ {
        alias /www/wwwroot/MuseumAgent_Client/unity/StreamingAssets/;
        
        # CORS 支持
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Range";
        
        # 处理 CORS 预检请求
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Range";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
        
        # ✅ 支持断点续传（音频/视频必需）
        add_header Accept-Ranges bytes;
        
        # ✅ 增加超时时间（支持大文件）
        send_timeout 600s;
        client_body_timeout 600s;
        
        # ✅ 音频、视频、JSON 文件类型支持
        types {
            audio/mpeg mp3;
            audio/wav wav;
            audio/ogg ogg;
            video/mp4 mp4;
            video/webm webm;
            application/json json;
            text/plain txt;
            text/xml xml;
        }
        
        # 缓存策略（较短，因为可能更新）
        add_header Cache-Control "public, max-age=3600";
        expires 1h;
        
        # 允许动态压缩（但不压缩音频/视频）
        gzip on;
        gzip_types application/json text/plain text/xml;
        
        access_log off;
    }

    # ========== 控制面板（通过 /mas 访问，优先级最高）==========
    # 重定向 /mas 到 /mas/
    location = /mas {
        return 301 /mas/;
    }
    
    # 控制面板 API 代理（必须在静态文件之前，优先级更高）
    location /mas/api/ {
        proxy_pass http://127.0.0.1:12301/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
    
    # 控制面板内部 API 代理
    location /mas/internal/ {
        proxy_pass http://127.0.0.1:12301/internal/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
    
    # ========== 控制面板 WebSocket 代理（优化版 - 增加超时时间）==========
    location /mas/ws/ {
        proxy_pass http://127.0.0.1:12301/ws/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # ✅ 优化：增加超时时间
        proxy_connect_timeout 60s;
        proxy_read_timeout 600s;      # 从 300s 增加到 600s（10分钟）
        proxy_send_timeout 600s;      # 从 300s 增加到 600s（10分钟）
        
        # ✅ 优化：禁用缓冲，实时传输
        proxy_buffering off;
        proxy_request_buffering off;
        
        # ✅ 优化：保持长连接
        proxy_socket_keepalive on;
    }
    
    # 控制面板静态文件（必须在 API 之后）
    location /mas/ {
        alias /opt/MuseumAgent_Server/control-panel/dist/;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # 静态文件缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    } 

    # ========== 智能体客户端 WebSocket 服务（优化版 - 增加超时时间）==========
    location /agent/ws/ {
        proxy_pass http://127.0.0.1:12301/ws/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # ✅ 优化：增加超时时间，支持 Unity 长时间加载
        proxy_connect_timeout 60s;
        proxy_read_timeout 600s;      # 从 300s 增加到 600s（10分钟）
        proxy_send_timeout 600s;      # 从 300s 增加到 600s（10分钟）
        
        # ✅ 优化：禁用缓冲，实时传输
        proxy_buffering off;
        proxy_request_buffering off;
        
        # ✅ 优化：保持长连接
        proxy_socket_keepalive on;
    }
    
    # ========== 智能体客户端 API 服务（独立路径）==========
    location /agent/api/ {
        proxy_pass http://127.0.0.1:12301/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ========== 旧的 /Control/ 路径保留（兼容性）==========
    location /Control/ {
        return 301 /mas/;
    }

    location /srs/ { 
        # return 403 "Access to /srs is temporarily disabled"; 
        proxy_pass http://127.0.0.1:12315/; 
        proxy_set_header Host $host; 
        proxy_set_header X-Real-IP $remote_addr; 
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
        proxy_set_header X-Forwarded-Proto $scheme; 
        proxy_connect_timeout 60s; 
        proxy_read_timeout 60s; 
        proxy_send_timeout 60s; 
    } 

    #ERROR-PAGE-START  错误页配置，可以注释、删除或修改 
    #error_page 404 /404.html; 
    #error_page 502 /502.html; 
    #ERROR-PAGE-END 

    #REWRITE-START URL重写规则引用,修改后将导致面板设置的伪静态规则失效 
    include /www/server/panel/vhost/rewrite/html_www.soulflaw.com.conf; 
    #REWRITE-END 

    #禁止访问的文件或目录 
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md) 
    { 
        return 404; 
    } 

    #一键申请SSL证书验证目录相关设置 
    location ~ \.well-known{ 
        allow all; 
    } 

    #禁止在证书验证目录放入敏感文件 
    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) { 
        return 403; 
    } 

    location ~ .*\\.(gif|jpg|jpeg,png,bmp,swf)$ 
    { 
        expires      30d; 
        error_log /dev/null; 
        access_log /dev/null; 
    } 

    location ~ .*\\.(js,css)?$ 
    { 
        expires      12h; 
        error_log /dev/null; 
        access_log /dev/null; 
    } 
    access_log  /www/wwwlogs/www.soulflaw.com.log; 
    error_log  /www/wwwlogs/www.soulflaw.com.error.log; 
}