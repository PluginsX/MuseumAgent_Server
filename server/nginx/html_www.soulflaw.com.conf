server 
{ 
    listen 80; 
    listen 443 ssl; 
    listen 443 quic; 
    http2 on; 
    server_name www.soulflaw.com; 
    index index.html index.htm default.htm default.html; 
    root /www/wwwroot/MuseumAgent_Client; 
    include /www/server/panel/vhost/nginx/extension/www.soulflaw.com/*.conf; 
    #CERT-APPLY-CHECK--START 
    # 用于SSL证书申请时的文件验证相关配置 -- 请勿删除并保持这段设置在优先级高的位置 
    include /www/server/panel/vhost/nginx/well-known/www.soulflaw.com.conf; 
    #CERT-APPLY-CHECK--END 

    #SSL-START SSL相关配置，请勿删除或修改下一行带注释的404规则 
    #error_page 404/404.html; 
    #HTTP_TO_HTTPS_START 
    set $isRedcert 1; 
    if ($server_port != 443) { 
        set $isRedcert 2; 
    } 
    if ( $uri ~ /\.well-known/ ) { 
        set $isRedcert 1; 
    } 
    if ($isRedcert != 1) { 
        rewrite ^(/.*)$ https://$host$1 permanent; 
    } 
    #HTTP_TO_HTTPS_END 
    ssl_certificate    /www/server/panel/vhost/cert/www.soulflaw.com/fullchain.pem; 
    ssl_certificate_key    /www/server/panel/vhost/cert/www.soulflaw.com/privkey.pem; 
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3; 
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5; 
    ssl_prefer_server_ciphers on; 
    ssl_session_tickets on; 
    ssl_session_cache shared:SSL:10m; 
    ssl_session_timeout 10m; 
    add_header Strict-Transport-Security "max-age=31536000"; 
    add_header Alt-Svc 'quic=":443"; h3=":443"; h3-29=":443"; h3-27=":443";h3-25=":443"; h3-T050=":443"; h3-Q050=":443";h3-Q049=":443";h3-Q048=":443"; h3-Q046=":443"; h3-Q043=":443"'; 
    error_page 497 https://$host$request_uri; 

    #SSL-END 

    # ========== Unity Addressables 资源服务（优先级最高）==========
    location /unity/ServerData/ {
        alias /www/wwwroot/MuseumAgent_Client/unity/ServerData/;
        
        # 允许跨域访问（Unity WebGL 必需）
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type";
        
        # 处理 OPTIONS 预检请求
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
        
        # Unity AssetBundle 文件类型
        types {
            application/octet-stream bundle;
            application/json json;
            text/plain hash;
        }
        
        # 长期缓存（AssetBundle 文件名包含哈希值，可以安全缓存）
        expires 365d;
        add_header Cache-Control "public, immutable";
        
        # 禁用访问日志（减少 I/O）
        access_log off;
    }

    # ========== 控制面板（通过 /mas 访问，优先级最高）==========
    # 重定向 /mas 到 /mas/
    location = /mas {
        return 301 /mas/;
    }
    
    # 控制面板 API 代理（必须在静态文件之前，优先级更高）
    location /mas/api/ {
        proxy_pass http://127.0.0.1:12301/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
    
    # 控制面板内部 API 代理
    location /mas/internal/ {
        proxy_pass http://127.0.0.1:12301/internal/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
    
    # WebSocket 代理（用于智能体服务，如果需要）
    location /mas/ws/ {
        proxy_pass http://127.0.0.1:12301/ws/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }
    
    # 控制面板静态文件（必须在 API 之后）
    location /mas/ {
        alias /opt/MuseumAgent_Server/control-panel/dist/;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # 静态文件缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    } 

    # ========== 智能体客户端 WebSocket 服务（独立路径）==========
    location /agent/ws/ {
        proxy_pass http://127.0.0.1:12301/ws/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }
    
    # ========== 智能体客户端 API 服务（独立路径）==========
    location /agent/api/ {
        proxy_pass http://127.0.0.1:12301/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ========== 旧的 /Control/ 路径保留（兼容性）==========
    location /Control/ {
        return 301 /mas/;
    }

    location /srs/ { 
        # return 403 "Access to /srs is temporarily disabled"; 
        proxy_pass http://127.0.0.1:12315/; 
        proxy_set_header Host $host; 
        proxy_set_header X-Real-IP $remote_addr; 
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
        proxy_set_header X-Forwarded-Proto $scheme; 
        proxy_connect_timeout 60s; 
        proxy_read_timeout 60s; 
        proxy_send_timeout 60s; 
    } 

    #ERROR-PAGE-START  错误页配置，可以注释、删除或修改 
    #error_page 404 /404.html; 
    #error_page 502 /502.html; 
    #ERROR-PAGE-END 

    #REWRITE-START URL重写规则引用,修改后将导致面板设置的伪静态规则失效 
    include /www/server/panel/vhost/rewrite/html_www.soulflaw.com.conf; 
    #REWRITE-END 

    #禁止访问的文件或目录 
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md) 
    { 
        return 404; 
    } 

    #一键申请SSL证书验证目录相关设置 
    location ~ \.well-known{ 
        allow all; 
    } 

    #禁止在证书验证目录放入敏感文件 
    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) { 
        return 403; 
    } 

    location ~ .*\\.(gif|jpg|jpeg,png,bmp,swf)$ 
    { 
        expires      30d; 
        error_log /dev/null; 
        access_log /dev/null; 
    } 

    location ~ .*\\.(js,css)?$ 
    { 
        expires      12h; 
        error_log /dev/null; 
        access_log /dev/null; 
    } 
    access_log  /www/wwwlogs/www.soulflaw.com.log; 
    error_log  /www/wwwlogs/www.soulflaw.com.error.log; 
}