server 
{ 
    listen 80; 
    listen 443 ssl; 
    listen 443 quic; 
    http2 on; 
    server_name www.soulflaw.com; 
    index index.html index.htm default.htm default.html; 
    root /www/wwwroot/MuseumAgent_Client; 
    include /www/server/panel/vhost/nginx/extension/www.soulflaw.com/*.conf; 
    #CERT-APPLY-CHECK--START 
    # 用于SSL证书申请时的文件验证相关配置 -- 请勿删除并保持这段设置在优先级高的位置 
    include /www/server/panel/vhost/nginx/well-known/www.soulflaw.com.conf; 
    #CERT-APPLY-CHECK--END 

    #SSL-START SSL相关配置，请勿删除或修改下一行带注释的404规则 
    #error_page 404/404.html; 
    #HTTP_TO_HTTPS_START 
    set $isRedcert 1; 
    if ($server_port != 443) { 
        set $isRedcert 2; 
    } 
    if ( $uri ~ /\.well-known/ ) { 
        set $isRedcert 1; 
    } 
    if ($isRedcert != 1) { 
        rewrite ^(/.*)$ https://$host$1 permanent; 
    } 
    #HTTP_TO_HTTPS_END 
    ssl_certificate    /www/server/panel/vhost/cert/www.soulflaw.com/fullchain.pem; 
    ssl_certificate_key    /www/server/panel/vhost/cert/www.soulflaw.com/privkey.pem; 
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3; 
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5; 
    ssl_prefer_server_ciphers on; 
    ssl_session_tickets on; 
    ssl_session_cache shared:SSL:10m; 
    ssl_session_timeout 10m; 
    add_header Strict-Transport-Security "max-age=31536000"; 
    add_header Alt-Svc 'quic=":443"; h3=":443"; h3-29=":443"; h3-27=":443";h3-25=":443"; h3-T050=":443"; h3-Q050=":443";h3-Q049=":443";h3-Q048=":443"; h3-Q046=":443"; h3-Q043=":443"'; 
    error_page 497 https://$host$request_uri; 

    #SSL-END 

    # ========== ✅ 根路径 - 智能体客户端 Demo（最高优先级）==========
    location / {
        root /www/wwwroot/MuseumAgent_Client;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # 静态文件缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ========== ✅ Unity WebGL Build 文件服务（优化版 - 针对低带宽优化）==========
    # .unityweb 文件（Unity 预压缩的 gzip 文件）
    location ~ ^/unity/Build/(.+\.unityweb)$ {
        alias /www/wwwroot/MuseumAgent_Client/unity/Build/$1;
        
        # ✅ 关键修复：不要添加 Content-Encoding 头！
        # Unity 的 .unityweb 文件本身就是 gzip 压缩的
        
        # MIME 类型
        types {
            application/octet-stream unityweb;
        }
        
        # CORS 支持
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Range";
        
        # 强缓存（1年）- Unity 文件名包含哈希
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 365d;
        
        # ✅ 优化传输（针对低带宽）
        # 禁用动态压缩（文件已预压缩）
        gzip off;
        brotli off;
        
        # ✅ 优化：启用 TCP_NODELAY 和 TCP_NOPUSH
        tcp_nodelay on;
        tcp_nopush on;
        
        # ✅ 优化：增加发送缓冲区
        sendfile on;
        sendfile_max_chunk 1m;
        
        # ✅ 优化：增加超时时间
        send_timeout 300s;
        
        # 禁用访问日志
        access_log off;
    }
    
    # .loader.js 文件（未压缩）
    location ~ ^/unity/Build/(.+\.loader\.js)$ {
        alias /www/wwwroot/MuseumAgent_Client/unity/Build/$1;
        
        # CORS 支持
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        
        # 缓存策略
        add_header Cache-Control "public, max-age=31536000";
        expires 365d;
        
        # MIME 类型
        types { 
            application/javascript js; 
        }
        
        # 允许动态压缩
        gzip on;
        gzip_types application/javascript;
        
        access_log off;
    }
    
    # Unity Build 目录（其他文件）
    location /unity/Build/ {
        alias /www/wwwroot/MuseumAgent_Client/unity/Build/;
        
        # CORS 支持
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        
        # 禁用动态压缩
        gzip off;
        brotli off;
        
        access_log off;
    }
    
    # ========== ✅ Unity Addressables 资源服务 ==========
    location /unity/ServerData/ {
        alias /www/wwwroot/MuseumAgent_Client/unity/ServerData/;
        
        # CORS 支持
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Range";
        
        # 支持断点续传
        add_header Accept-Ranges bytes;
        
        # ✅ 关键修复：禁用所有压缩！
        # AssetBundle 文件不能被压缩，否则会导致 CRC Mismatch
        gzip off;
        brotli off;
        
        # Unity AssetBundle 文件类型
        types {
            application/octet-stream bundle;
            application/json json;
            text/plain hash;
        }
        
        # 长期缓存
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 365d;
        
        # 禁用访问日志
        access_log off;
    }
    
    # Unity StreamingAssets 资源服务
    location /unity/StreamingAssets/ {
        alias /www/wwwroot/MuseumAgent_Client/unity/StreamingAssets/;
        
        # CORS 支持
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Range";
        
        # 支持断点续传
        add_header Accept-Ranges bytes;
        
        # 音频、视频文件类型支持
        types {
            audio/mpeg mp3;
            audio/wav wav;
            audio/ogg ogg;
            video/mp4 mp4;
            video/webm webm;
            application/json json;
            text/plain txt;
        }
        
        # 缓存策略
        add_header Cache-Control "public, max-age=3600";
        expires 1h;
        
        access_log off;
    }

    # ========== 控制面板（通过 /mas 访问）==========
    location = /mas {
        return 301 /mas/;
    }
    
    # 控制面板 API 代理
    location /mas/api/ {
        proxy_pass http://127.0.0.1:12301/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
    
    # 控制面板内部 API 代理
    location /mas/internal/ {
        proxy_pass http://127.0.0.1:12301/internal/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
    
    # 控制面板 WebSocket 代理
    location /mas/ws/ {
        proxy_pass http://127.0.0.1:12301/ws/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时配置
        proxy_connect_timeout 60s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        
        # 禁用缓冲
        proxy_buffering off;
        proxy_request_buffering off;
        
        # 保持长连接
        proxy_socket_keepalive on;
    }
    
    # 控制面板静态文件
    location /mas/ {
        alias /opt/MuseumAgent_Server/control-panel/dist/;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # 静态文件缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    } 

    # ========== 智能体客户端 WebSocket 服务 ==========
    location /agent/ws/ {
        proxy_pass http://127.0.0.1:12301/ws/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时配置
        proxy_connect_timeout 60s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        
        # 禁用缓冲
        proxy_buffering off;
        proxy_request_buffering off;
        
        # 保持长连接
        proxy_socket_keepalive on;
    }
    
    # 智能体客户端 API 服务
    location /agent/api/ {
        proxy_pass http://127.0.0.1:12301/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # 旧的 /Control/ 路径保留（兼容性）
    location /Control/ {
        return 301 /mas/;
    }

    # SRS 语义检索系统代理
    location /srs/ { 
        proxy_pass http://127.0.0.1:12315/; 
        proxy_set_header Host $host; 
        proxy_set_header X-Real-IP $remote_addr; 
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
        proxy_set_header X-Forwarded-Proto $scheme; 
        proxy_connect_timeout 60s; 
        proxy_read_timeout 60s; 
        proxy_send_timeout 60s; 
    } 

    #ERROR-PAGE-START  错误页配置，可以注释、删除或修改 
    #error_page 404 /404.html; 
    #error_page 502 /502.html; 
    #ERROR-PAGE-END 

    #REWRITE-START URL重写规则引用,修改后将导致面板设置的伪静态规则失效 
    include /www/server/panel/vhost/rewrite/html_www.soulflaw.com.conf; 
    #REWRITE-END 

    #禁止访问的文件或目录 
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md) 
    { 
        return 404; 
    } 

    #一键申请SSL证书验证目录相关设置 
    location ~ \.well-known{ 
        allow all; 
    } 

    #禁止在证书验证目录放入敏感文件 
    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) { 
        return 403; 
    } 

    location ~ .*\\.(gif|jpg|jpeg,png,bmp,swf)$ 
    { 
        expires      30d; 
        error_log /dev/null; 
        access_log /dev/null; 
    } 

    location ~ .*\\.(js,css)?$ 
    { 
        expires      12h; 
        error_log /dev/null; 
        access_log /dev/null; 
    } 
    access_log  /www/wwwlogs/www.soulflaw.com.log; 
    error_log  /www/wwwlogs/www.soulflaw.com.error.log; 
}
